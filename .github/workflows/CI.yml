name: CI
on:
  push:
    branches: [master]
    tags: ['*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version: ['1.12']
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v2
      - name: Build package
        uses: julia-actions/julia-buildpkg@v1
      # Tests run in the dedicated test/ environment; :npu/:network tagged tests auto-skip
      # on CI. We `develop` the package explicitly (rather than rely on test/Project.toml's
      # [sources], which only works on Julia 1.11+) so the matrix's 1.10 job resolves too.
      - name: Run tests
        run: |
          julia --project=test -e 'using Pkg; Pkg.develop(PackageSpec(path=pwd())); Pkg.instantiate()'
          julia --project=test test/runtests.jl
